<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomusCar — Indicadores e Objetivos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --navy: #003B73; --navy-deep: #002B55; --navy-light: #00508F;
  --accent: #007BC0; --accent-light: #4DA8DA; --white: #FFFFFF; --off-white: #F5F7FA;
  --gray-100: #EEF1F5; --gray-200: #DEE2E8; --gray-400: #9CA3AF;
  --gray-600: #6B7280; --text-dark: #1A2A3A; --text-body: #475569;
  --green: #059669; --yellow: #D97706; --red: #DC2626;
  --radius: 16px; --radius-sm: 12px; --transition: .3s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--off-white); color:var(--text-body); line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

/* Hero */
.hero {
  position:relative;
  background:linear-gradient(135deg,var(--navy-deep) 0%,var(--navy) 50%,var(--navy-light) 100%);
  color:var(--white); overflow:hidden; padding:44px 0 34px;
}
.hero::before {
  content:''; position:absolute; top:-40%; right:-10%;
  width:700px; height:700px;
  background:radial-gradient(circle,rgba(0,123,192,.12) 0%,transparent 70%);
  border-radius:50%; pointer-events:none;
}
.hero-inner { position:relative; z-index:2; }
.hero h1 { font-size:clamp(1.6rem,3.5vw,2.2rem); font-weight:900; margin-bottom:6px; }
.hero h1 em { font-style:normal; color:var(--accent-light); }
.hero-desc { font-size:.95rem; opacity:.8; max-width:600px; }
.hero-bar { position:absolute; bottom:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 40%,var(--navy-light) 40%); }

.container { max-width:1140px; margin:0 auto; padding:0 24px; }
.section { padding:36px 0; }

/* Breadcrumb */
.breadcrumb {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:16px 0; font-size:.84rem; color:var(--gray-600);
}
.breadcrumb a {
  color:var(--accent); text-decoration:none; font-weight:600; cursor:pointer;
}
.breadcrumb a:hover { text-decoration:underline; }
.breadcrumb .sep { color:var(--gray-400); }

/* Category cards (level 1) */
.cat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }
.cat-card {
  background:var(--white); border-radius:var(--radius); padding:32px 28px;
  box-shadow:0 2px 12px rgba(0,59,115,.06); border:1px solid var(--gray-200);
  cursor:pointer; transition:var(--transition); position:relative; overflow:hidden;
}
.cat-card:hover { box-shadow:0 8px 28px rgba(0,59,115,.12); transform:translateY(-3px); }
.cat-card::before {
  content:''; position:absolute; top:0; left:0; width:4px; height:100%;
  background:var(--accent); border-radius:2px 0 0 2px;
}
.cat-card-icon { font-size:2rem; margin-bottom:14px; }
.cat-card h3 { font-size:1.1rem; font-weight:700; color:var(--navy); margin-bottom:6px; }
.cat-card p { font-size:.88rem; color:var(--text-body); line-height:1.6; }

/* Year pills (level 2) */
.year-grid { display:flex; gap:16px; flex-wrap:wrap; }
.year-card {
  flex:1; min-width:200px; background:var(--white); border-radius:var(--radius);
  padding:28px 24px; box-shadow:0 2px 12px rgba(0,59,115,.06);
  border:1px solid var(--gray-200); cursor:pointer; transition:var(--transition);
  text-align:center;
}
.year-card:hover { box-shadow:0 6px 24px rgba(0,59,115,.1); transform:translateY(-2px); border-color:var(--accent); }
.year-card .year-num { font-size:2rem; font-weight:900; color:var(--navy); }
.year-card p { font-size:.85rem; color:var(--gray-600); margin-top:4px; }

/* Ticket subview pills */
.subview-grid { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:28px; }
.subview-card {
  flex:1; min-width:200px; background:var(--white); border-radius:var(--radius);
  padding:28px 24px; box-shadow:0 2px 12px rgba(0,59,115,.06);
  border:1px solid var(--gray-200); cursor:pointer; transition:var(--transition);
  text-align:center;
}
.subview-card:hover { box-shadow:0 6px 24px rgba(0,59,115,.1); transform:translateY(-2px); border-color:var(--accent); }
.subview-card .sv-icon { font-size:2rem; margin-bottom:10px; }
.subview-card h4 { font-size:1.1rem; font-weight:700; color:var(--navy); }
.subview-card p { font-size:.82rem; color:var(--gray-600); margin-top:4px; }

/* Ticket geral dashboard */
.tg-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-bottom:24px; }
.tg-card {
  background:var(--white); border-radius:var(--radius); padding:24px 22px;
  box-shadow:0 2px 12px rgba(0,59,115,.06); border:1px solid var(--gray-200);
  position:relative; overflow:hidden;
}
.tg-card::before {
  content:''; position:absolute; top:0; left:0; width:4px; height:100%;
  border-radius:2px 0 0 2px;
}
.tg-card.lisboa::before { background:var(--accent); }
.tg-card.cacem::before { background:var(--green); }
.tg-card.colisao::before { background:var(--yellow); }
.tg-card.domuscar::before { background:var(--navy); }
.tg-card-title { font-size:.82rem; font-weight:700; color:var(--navy); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.tg-big { font-size:1.8rem; font-weight:900; color:var(--navy); line-height:1; }
.tg-row { display:flex; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--gray-100); }
.tg-metric { text-align:center; flex:1; }
.tg-metric-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.4px; color:var(--gray-600); font-weight:600; }
.tg-metric-val { font-size:1rem; font-weight:700; color:var(--text-dark); margin-top:2px; }
.tg-metric-sub { font-size:.72rem; color:var(--gray-400); }

/* Ticket por Cliente block (breakdown by client type) */
.tc-section { margin-top:32px; }
.tc-section-title {
  font-size:1.05rem; font-weight:800; color:var(--navy); margin-bottom:6px;
  display:flex; align-items:center; gap:10px;
}
.tc-section-sub { font-size:.82rem; color:var(--text-body); margin-bottom:16px; }
.tc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
.tc-card {
  background:var(--white); border-radius:var(--radius); padding:20px 22px;
  box-shadow:0 2px 12px rgba(0,59,115,.06); border:1px solid var(--gray-200);
  position:relative; overflow:hidden;
}
.tc-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; border-radius:2px 0 0 2px; }
.tc-card.lisboa::before { background:var(--accent); }
.tc-card.cacem::before { background:var(--green); }
.tc-card.colisao::before { background:var(--yellow); }
.tc-card.domuscar::before { background:var(--navy); }
.tc-card-title { font-size:.85rem; font-weight:700; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.tc-card-title .tc-total { font-size:.72rem; color:var(--gray-600); font-weight:600; }
.tc-row { display:grid; grid-template-columns:1fr auto auto; gap:8px; align-items:center; padding:8px 0; border-bottom:1px dashed var(--gray-100); font-size:.82rem; }
.tc-row:last-child { border-bottom:none; }
.tc-label { font-weight:700; }
.tc-label.lp { color:#d97706; }
.tc-label.em { color:#059669; }
.tc-label.pa { color:#7c3aed; }
.tc-label-sub { font-size:.7rem; color:var(--gray-600); font-weight:500; display:block; }
.tc-val { font-weight:800; color:var(--navy); text-align:right; min-width:72px; }
.tc-val-sm { font-size:.72rem; color:var(--gray-600); text-align:right; font-weight:600; }

/* Tabela mensal por cliente */
.tc-mensal-wrap { margin-top:24px; background:var(--white); border-radius:var(--radius); overflow:hidden;
  box-shadow:0 2px 12px rgba(0,59,115,.06); border:1px solid var(--gray-200); }
.tc-mensal-table { width:100%; border-collapse:collapse; font-size:.82rem; }
.tc-mensal-table th { background:var(--navy); color:var(--white); padding:10px 12px; text-align:center;
  font-weight:600; font-size:.72rem; text-transform:uppercase; letter-spacing:.3px; }
.tc-mensal-table td { padding:9px 12px; text-align:right; border-bottom:1px solid var(--gray-100); }
.tc-mensal-table td:first-child { text-align:left; font-weight:600; color:var(--navy); }
.tc-mensal-table th.cat-lp { background:#d97706; }
.tc-mensal-table th.cat-em { background:#059669; }
.tc-mensal-table th.cat-pa { background:#7c3aed; }
.tc-mensal-table tr.total-row { background:var(--gray-100); font-weight:800; }
.tc-mensal-table tr.total-row td { color:var(--navy); }
.tc-mensal-table .diff-pos { color:#059669; font-weight:700; }
.tc-mensal-table .diff-neg { color:var(--gray-400); font-weight:500; }

/* Comparativo */
.comp-section {
  margin-top:36px; background:var(--white); border-radius:var(--radius);
  padding:32px 28px; box-shadow:0 2px 12px rgba(0,59,115,.06);
  border:1px solid var(--gray-200); position:relative; overflow:hidden;
}
.comp-section::before {
  content:''; position:absolute; top:0; left:0; width:4px; height:100%;
  background:linear-gradient(180deg,var(--accent),var(--green)); border-radius:2px 0 0 2px;
}
.comp-title { font-size:1.1rem; font-weight:800; color:var(--navy); margin-bottom:4px; }
.comp-subtitle { font-size:.85rem; color:var(--text-body); margin-bottom:20px; }
.comp-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; margin-bottom:24px; }
.comp-kpi {
  background:var(--off-white); border-radius:var(--radius-sm); padding:18px 16px;
  text-align:center; border:1px solid var(--gray-100);
}
.comp-kpi-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.5px; color:var(--gray-600); font-weight:600; margin-bottom:6px; }
.comp-kpi-val { font-size:1.35rem; font-weight:800; color:var(--navy); }
.comp-kpi-sub { font-size:.75rem; color:var(--gray-600); margin-top:4px; }
.comp-kpi-delta { font-size:.8rem; font-weight:700; margin-top:4px; }
.comp-kpi-delta.up { color:var(--green); }
.comp-kpi-delta.down { color:var(--red); }
.comp-chart-wrap { margin-top:8px; max-height:280px; }
.comp-table-wrap { margin-top:20px; overflow-x:auto; }
.comp-table { width:100%; border-collapse:collapse; font-size:.82rem; }
.comp-table th { background:var(--navy); color:var(--white); padding:10px 12px; text-align:center; font-weight:600; font-size:.75rem; text-transform:uppercase; letter-spacing:.3px; }
.comp-table td { padding:9px 12px; text-align:right; border-bottom:1px solid var(--gray-100); }
.comp-table tr:hover td { background:rgba(0,123,192,.03); }
.comp-table td:first-child { text-align:left; font-weight:600; color:var(--navy); }

/* Unit pills (level 3) */
.unit-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
.unit-card {
  background:var(--white); border-radius:var(--radius-sm); padding:24px 22px;
  box-shadow:0 2px 10px rgba(0,59,115,.05); border:1px solid var(--gray-200);
  cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:16px;
}
.unit-card:hover { box-shadow:0 6px 20px rgba(0,59,115,.1); transform:translateY(-2px); border-color:var(--accent); }
.unit-icon {
  width:48px; height:48px; border-radius:var(--radius-sm); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:1.4rem;
}
.unit-icon.lisboa { background:rgba(0,123,192,.08); }
.unit-icon.cacem { background:rgba(5,150,105,.08); }
.unit-icon.colisao { background:rgba(217,119,6,.08); }
.unit-icon.domuscar { background:rgba(0,43,85,.08); }
.unit-card h4 { font-size:.95rem; font-weight:700; color:var(--navy); }
.unit-card p { font-size:.8rem; color:var(--gray-600); }

/* Data view (level 4) */
.data-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:24px; flex-wrap:wrap; gap:12px;
}
.data-header h2 { font-size:1.2rem; font-weight:800; color:var(--navy); }
.data-badge {
  padding:6px 14px; border-radius:20px; font-size:.78rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.5px;
}
.data-badge.placeholder { background:var(--gray-100); color:var(--gray-600); }

.chart-container {
  background:var(--white); border-radius:var(--radius); padding:24px;
  box-shadow:0 2px 12px rgba(0,59,115,.06); border:1px solid var(--gray-200);
  margin-bottom:24px;
}
.chart-container canvas { max-height:320px; }

.data-table-wrap {
  background:var(--white); border-radius:var(--radius); overflow:hidden;
  box-shadow:0 2px 12px rgba(0,59,115,.06); border:1px solid var(--gray-200);
}
.data-table {
  width:100%; border-collapse:collapse; font-size:.85rem;
}
.data-table th {
  text-align:left; padding:12px 16px; background:var(--navy);
  color:var(--white); font-weight:600; font-size:.78rem;
  text-transform:uppercase; letter-spacing:.5px;
}
.data-table th:first-child { border-radius:0; }
.data-table td { padding:10px 16px; border-bottom:1px solid var(--gray-100); }
.data-table tr:hover td { background:rgba(0,123,192,.02); }
.data-table .placeholder-val { color:var(--gray-400); font-style:italic; }

/* Back button */
.btn-back {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 18px; border:1.5px solid var(--gray-200); border-radius:8px;
  background:var(--white); color:var(--navy); font-family:inherit;
  font-size:.84rem; font-weight:600; cursor:pointer; transition:var(--transition);
}
.btn-back:hover { border-color:var(--accent); background:rgba(0,123,192,.03); }

/* Info banner */
.info-banner {
  background:rgba(0,123,192,.06); border:1px solid rgba(0,123,192,.15);
  border-radius:var(--radius-sm); padding:16px 20px;
  font-size:.88rem; color:var(--navy); margin-bottom:24px;
  display:flex; align-items:center; gap:10px;
}

/* ══════ KPI por técnico (2026) ══════ */
.tec-section { margin-top:28px; }
.tec-section-title {
  font-size:1rem; font-weight:800; color:var(--navy); text-transform:uppercase;
  letter-spacing:.5px; margin:0 0 12px;
  padding-bottom:8px; border-bottom:2px solid var(--gray-100);
}
.tec-month-tabs {
  display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;
}
.tec-month-tab {
  padding:8px 16px; border-radius:8px; border:1px solid var(--gray-200);
  background:#fff; font-size:.85rem; font-weight:600; color:var(--gray-600);
  cursor:pointer; transition:var(--transition);
}
.tec-month-tab:hover { border-color:var(--accent); color:var(--navy); }
.tec-month-tab.active {
  background:var(--navy); color:#fff; border-color:var(--navy);
}
.tec-month-tab.disabled {
  opacity:.35; cursor:not-allowed; background:var(--gray-50);
}
.tec-subsection {
  background:#fff; border:1px solid var(--gray-100);
  border-radius:var(--radius-sm); padding:16px 18px; margin-bottom:16px;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.tec-subsection-header {
  font-size:.82rem; font-weight:800; color:var(--accent); text-transform:uppercase;
  letter-spacing:.6px; margin-bottom:10px;
}
.tec-kpi-table, .tec-ranking-table {
  width:100%; border-collapse:collapse; font-size:.83rem;
}
.tec-kpi-table th, .tec-ranking-table th {
  background:var(--navy); color:#fff; text-align:left;
  padding:8px 12px; font-weight:700; font-size:.75rem; text-transform:uppercase;
  letter-spacing:.4px;
}
.tec-kpi-table td, .tec-ranking-table td {
  padding:8px 12px; border-bottom:1px solid var(--gray-100);
}
.tec-kpi-table tr:last-child td, .tec-ranking-table tr:last-child td { border-bottom:none; }
.tec-kpi-table td.mes { font-weight:700; background:rgba(0,123,192,.04); }
.tec-kpi-rankings { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:700px) { .tec-kpi-rankings { grid-template-columns:1fr; } }

.tec-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px;
}
.tec-card {
  background:#fff; border:1px solid var(--gray-100); border-left:3px solid var(--accent);
  border-radius:var(--radius-sm); padding:14px 14px 12px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.tec-card.lisboa { border-left-color:#6366f1; }
.tec-card.cacem { border-left-color:#059669; }
.tec-card.colisao { border-left-color:#d97706; }
.tec-card-name {
  font-size:.95rem; font-weight:800; color:var(--navy); margin-bottom:10px;
}
.tec-card-weeks {
  width:100%; font-size:.76rem; border-collapse:collapse; margin-bottom:10px;
}
.tec-card-weeks th, .tec-card-weeks td {
  padding:4px 6px; text-align:center; border-bottom:1px solid var(--gray-50);
}
.tec-card-weeks th {
  background:var(--gray-50); color:var(--gray-600); font-weight:700;
  font-size:.68rem; text-transform:uppercase; letter-spacing:.3px;
}
.tec-card-weeks td:first-child { font-weight:700; color:var(--gray-600); }
.tec-card-summary {
  display:grid; grid-template-columns:1fr 1fr; gap:6px;
  background:var(--gray-50); border-radius:6px; padding:8px 10px;
  font-size:.74rem;
}
.tec-card-summary-item { display:flex; flex-direction:column; }
.tec-card-summary-label {
  font-size:.63rem; text-transform:uppercase; letter-spacing:.4px;
  color:var(--gray-600); font-weight:700;
}
.tec-card-summary-value { font-size:.95rem; font-weight:800; color:var(--navy); }
.tec-card-financials {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 10px; background:rgba(0,123,192,.06);
  border-radius:6px; margin-bottom:8px; font-size:.78rem;
}
.tec-card-fin-item { display:flex; flex-direction:column; }
.tec-card-fin-label {
  font-size:.62rem; text-transform:uppercase; letter-spacing:.4px;
  color:var(--gray-600); font-weight:700;
}
.tec-card-fin-value { font-size:.9rem; font-weight:800; color:var(--navy); }
.tec-util-ok { color:#059669; font-weight:700; }
.tec-util-warn { color:#d97706; font-weight:700; }
.tec-util-bad { color:#dc2626; font-weight:700; }
.tec-util-high { color:#2563eb; font-weight:700; }

/* Responsive */
@media(max-width:600px) {
  .hero { padding:30px 0 22px; }
  .cat-grid, .unit-grid { grid-template-columns:1fr; }
  .year-grid { flex-direction:column; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="container">
    <div class="hero-inner">
      <h1>Indicadores e <em>Objetivos</em></h1>
      <p class="hero-desc">Acompanhamento de KPIs, ticket médio e margem mensal por unidade.</p>
    </div>
  </div>
  <div class="hero-bar"></div>
</div>

<div class="section">
  <div class="container">
    <div id="breadcrumb" class="breadcrumb"></div>
    <div id="content"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var MONTHS_SHORT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  var CATEGORIES = [
    {
      id: 'kpis',
      icon: '📈',
      title: 'KPIs Coordenação',
      desc: 'Indicadores-chave de desempenho por unidade — horas, eficiência produtiva e utilização.',
      columns: ['Horas Trabalhadas', 'Horas Vendidas', 'Horas Disponíveis', 'Eficiência Produtiva (%)', 'Utilização (%)'],
      chartLabel: 'Eficiência Produtiva (%)',
      chartIndex: 3
    },
    {
      id: 'ticket',
      icon: '🎫',
      title: 'Ticket Médio',
      desc: 'Valor médio por ordem de serviço — peças, mão-de-obra e total.',
      columns: ['Ticket Médio Total (€)', 'Peças (€)', 'Mão-de-Obra (€)', 'Nº Ordens Serviço'],
      chartLabel: 'Ticket Médio Total (€)',
      chartIndex: 0
    },
    {
      id: 'margem',
      icon: '💰',
      title: 'Margem Mensal',
      desc: 'Margem operacional mensal — vendas, custos fixos/variáveis e resultado líquido.',
      columns: ['Vendas s/ IVA (€)', 'Vendas MO (€)', 'Vendas Peças (€)', 'Custos Fixos (€)', 'Custos Var. (€)', 'Margem (€)', 'Margem (%)'],
      chartLabel: 'Margem (%)',
      chartIndex: 6
    }
  ];

  // ══════ DADOS REAIS KPIs 2025 ══════
  var KPI_DATA = {

  function renderComparativo() {
    var d25 = MARGEM_DATA[2025] && MARGEM_DATA[2025].domuscar ? MARGEM_DATA[2025].domuscar : [];
    var d26 = MARGEM_DATA[2026] && MARGEM_DATA[2026].domuscar ? MARGEM_DATA[2026].domuscar : [];

    // Find common months (both have data)
    var common = [];
    for (var i = 0; i < 12; i++) {
      if (d25[i] && d26[i]) common.push(i);
    }
    if (common.length === 0) return '';

    // Sums for common period
    var sum25 = { vendas: 0, mo: 0, pecas: 0, cf: 0, cv: 0, margem: 0 };
    var sum26 = { vendas: 0, mo: 0, pecas: 0, cf: 0, cv: 0, margem: 0 };
    common.forEach(function(i) {

      sum25.cf += d25[i][3]; sum25.cv += d25[i][4]; sum25.margem += d25[i][5];
      sum26.vendas += d26[i][0]; sum26.mo += d26[i][1]; sum26.pecas += d26[i][2];
      sum26.cf += d26[i][3]; sum26.cv += d26[i][4]; sum26.margem += d26[i][5];
    });
    var pct25 = sum25.vendas ? (sum25.margem / sum25.vendas * 100) : 0;
    var pct26 = sum26.vendas ? (sum26.margem / sum26.vendas * 100) : 0;

    var periodLabel = common.map(function(i) { return MONTHS_SHORT[i]; }).join(' – ');

    function delta(v26, v25) {
      var d = v26 - v25;
      var cls = d >= 0 ? 'up' : 'down';
      var sign = d >= 0 ? '+' : '';
      return '<div class="comp-kpi-delta ' + cls + '">' + sign + formatEur(d) + '</div>';
    }
    function deltaPct(v26, v25) {
      var d = v26 - v25;
      var cls = d >= 0 ? 'up' : 'down';
      var sign = d >= 0 ? '+' : '';

      if (!v25) return '';
      var p = ((v26 - v25) / Math.abs(v25)) * 100;
      var cls = p >= 0 ? 'up' : 'down';
      var sign = p >= 0 ? '+' : '';
      return '<div class="comp-kpi-sub">' + sign + p.toFixed(1) + '% vs 2025</div>';
    }

    var h = '<div class="comp-section">';
    h += '<div class="comp-title">📊 Comparativo Empresa — 2025 vs 2026</div>';
    h += '<div class="comp-subtitle">Período homólogo: ' + periodLabel + ' (' + common.length + ' meses com dados em ambos os anos)</div>';

    // KPI summary cards
    h += '<div class="comp-kpis">';
    h += '<div class="comp-kpi"><div class="comp-kpi-label">Vendas 2025</div><div class="comp-kpi-val">' + formatEur(sum25.vendas) + '</div></div>';
    h += '<div class="comp-kpi"><div class="comp-kpi-label">Vendas 2026</div><div class="comp-kpi-val">' + formatEur(sum26.vendas) + '</div>' + delta(sum26.vendas, sum25.vendas) + pctChange(sum26.vendas, sum25.vendas) + '</div>';
    h += '<div class="comp-kpi"><div class="comp-kpi-label">Margem 2025</div><div class="comp-kpi-val" style="color:' + (sum25.margem >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(sum25.margem) + '</div><div class="comp-kpi-sub">' + pct25.toFixed(2) + '%</div></div>';
    h += '<div class="comp-kpi"><div class="comp-kpi-label">Margem 2026</div><div class="comp-kpi-val" style="color:' + (sum26.margem >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(sum26.margem) + '</div><div class="comp-kpi-sub">' + pct26.toFixed(2) + '%</div>' + deltaPct(pct26, pct25) + '</div>';
    h += '</div>';

    // Chart
    h += '<div class="comp-chart-wrap"><canvas id="compChart"></canvas></div>';

    // Detail table
    h += '<div class="comp-table-wrap"><table class="comp-table"><thead><tr>';
    h += '<th>Mês</th><th>Vendas 2025</th><th>Vendas 2026</th><th>Δ Vendas</th><th>Margem 2025</th><th>Margem 2026</th><th>Δ Margem</th><th>% 2025</th><th>% 2026</th>';
    h += '</tr></thead><tbody>';

    common.forEach(function(i) {
      var dv = d26[i][0] - d25[i][0];
      var dm = d26[i][5] - d25[i][5];
      var dvCls = dv >= 0 ? 'var(--green)' : 'var(--red)';
      var dmCls = dm >= 0 ? 'var(--green)' : 'var(--red)';
      h += '<tr><td>' + MONTHS[i] + '</td>';
      h += '<td>' + formatEur(d25[i][0]) + '</td>';
      h += '<td>' + formatEur(d26[i][0]) + '</td>';
      h += '<td style="font-weight:700;color:' + dvCls + ';">' + (dv >= 0 ? '+' : '') + formatEur(dv) + '</td>';
      h += '<td style="color:' + (d25[i][5] >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(d25[i][5]) + '</td>';
      h += '<td style="color:' + (d26[i][5] >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(d26[i][5]) + '</td>';
      h += '<td style="font-weight:700;color:' + dmCls + ';">' + (dm >= 0 ? '+' : '') + formatEur(dm) + '</td>';
      h += '<td style="font-weight:600;color:' + (d25[i][6] >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + d25[i][6].toFixed(2) + '%</td>';
      h += '<td style="font-weight:600;color:' + (d26[i][6] >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + d26[i][6].toFixed(2) + '%</td>';
      h += '</tr>';
    });

    // Total row
    var dvT = sum26.vendas - sum25.vendas;
    var dmT = sum26.margem - sum25.margem;
    h += '<tr style="background:var(--gray-100);font-weight:700;"><td>Total</td>';
    h += '<td>' + formatEur(sum25.vendas) + '</td><td>' + formatEur(sum26.vendas) + '</td>';
    h += '<td style="color:' + (dvT >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (dvT >= 0 ? '+' : '') + formatEur(dvT) + '</td>';
    h += '<td style="color:' + (sum25.margem >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(sum25.margem) + '</td>';
    h += '<td style="color:' + (sum26.margem >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(sum26.margem) + '</td>';
    h += '<td style="color:' + (dmT >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (dmT >= 0 ? '+' : '') + formatEur(dmT) + '</td>';
    h += '<td style="color:' + (pct25 >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + pct25.toFixed(2) + '%</td>';
    h += '<td style="color:' + (pct26 >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + pct26.toFixed(2) + '%</td>';
    h += '</tr>';

    h += '</tbody></table></div></div>';
    return h;
  }

      {

        });

      html += '<span class="data-badge" style="background:rgba(5,150,105,.1);color:#059669;">Dados Reais</span>';
    } else {
      html += '<span class="data-badge placeholder">Em Breve</span>';

    // ─────────────────────────────────────────────────────────────
    if (hasClientData) {
      html += '<p style="font-size:.85rem;color:var(--text-body);margin:8px 0 16px;">Faturação reconciliada com a <b>Margem Mensal</b> detalhada. <b>LP+FC</b> com rappel contratual 25% deduzido (Cacém/Lisboa). <b>Empresa</b> inclui Fat. Interna e Aguarda NE. <b>Particular</b> inclui Outras Vendas (nº OS somado ao nº de docs). Resíduos divididos 50/50 Empresa/Particular.</p>';

      // Chart
      html += '<div class="chart-container"><canvas id="indicadorChart"></canvas></div>';

      // Tabela mensal por tipo de cliente
      html += '<div class="tc-mensal-wrap" style="margin-top:24px;">' +
        '<table class="tc-mensal-table"><thead><tr>' +
          '<th rowspan="2">Mês</th>' +
          '<th colspan="3" class="cat-lp">LeasePlan + FleetCover</th>' +
          '<th colspan="3" class="cat-em">Empresa (excl. LP)</th>' +
          '<th colspan="3" class="cat-pa">Particular</th>' +
        '</tr><tr>' +
          '<th class="cat-lp">€</th><th class="cat-lp">Nº</th><th class="cat-lp">Ticket</th>' +
          '<th class="cat-em">€</th><th class="cat-em">Nº</th><th class="cat-em">Ticket</th>' +
          '<th class="cat-pa">€</th><th class="cat-pa">Nº</th><th class="cat-pa">Ticket</th>' +
        '</tr></thead><tbody>';
      var tot = { lp:{e:0,n:0}, em:{e:0,n:0}, pa:{e:0,n:0} };
      MONTHS.forEach(function(m, i) {
        var d = cArr[i];
        html += '<tr><td>' + m + '</td>';
        if (d) {
          html += '<td>' + formatEur(d.lp.e) + '</td><td>' + d.lp.n + '</td><td>' + formatEur(d.lp.t) + '</td>';
          html += '<td>' + formatEur(d.em.e) + '</td><td>' + d.em.n + '</td><td>' + formatEur(d.em.t) + '</td>';
          html += '<td>' + formatEur(d.pa.e) + '</td><td>' + d.pa.n + '</td><td>' + formatEur(d.pa.t) + '</td>';
          tot.lp.e += d.lp.e; tot.lp.n += d.lp.n;
          tot.em.e += d.em.e; tot.em.n += d.em.n;
          tot.pa.e += d.pa.e; tot.pa.n += d.pa.n;
        } else {
          for (var c = 0; c < 9; c++) html += '<td class="placeholder-val">—</td>';
        }
        html += '</tr>';
      });
      if (tot.lp.n + tot.em.n + tot.pa.n > 0) {
        html += '<tr class="total-row"><td>Acumulado</td>';
        html += '<td>' + formatEur(tot.lp.e) + '</td><td>' + tot.lp.n + '</td><td>' + formatEur(tot.lp.n ? tot.lp.e/tot.lp.n : 0) + '</td>';
        html += '<td>' + formatEur(tot.em.e) + '</td><td>' + tot.em.n + '</td><td>' + formatEur(tot.em.n ? tot.em.e/tot.em.n : 0) + '</td>';
        html += '<td>' + formatEur(tot.pa.e) + '</td><td>' + tot.pa.n + '</td><td>' + formatEur(tot.pa.n ? tot.pa.e/tot.pa.n : 0) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table></div>';

      document.getElementById('content').innerHTML = html;
      setTimeout(function() { renderTicketMensalChart(cArr); }, 80);
      return;
    }

    // ─────────────────────────────────────────────────────────────
    // Ramo 2025 (legacy): tabela OSV/Peças/MO/Horas
    // ─────────────────────────────────────────────────────────────
    // Chart
    html += '<div class="chart-container"><canvas id="indicadorChart"></canvas></div>';

    // Table
    html += '<div class="data-table-wrap"><table class="data-table"><thead><tr><th>Mês</th>';
    TICKET_MENSAL_COLS.forEach(function(col) { html += '<th>' + col + '</th>'; });
    html += '</tr></thead><tbody>';

    MONTHS.forEach(function(m, i) {
      html += '<tr><td style="font-weight:600;color:var(--navy);">' + m + '</td>';
      if (monthly[i]) {
        html += '<td style="font-weight:700;color:var(--navy);">' + monthly[i][0] + '</td>';
        html += '<td>' + formatEur(monthly[i][1]) + '</td>';
        html += '<td>' + formatEur(monthly[i][2]) + '</td>';
        html += '<td style="font-weight:700;color:var(--accent);">' + formatEur(monthly[i][3]) + '</td>';
        html += '<td>' + formatNum(monthly[i][4]) + '</td>';
        html += '<td>' + formatNum(monthly[i][5]) + '</td>';
        html += '<td>' + formatNum(monthly[i][6]) + '</td>';
        html += '<td>' + formatEur(monthly[i][7]) + '</td>';
      } else {
        TICKET_MENSAL_COLS.forEach(function() { html += '<td class="placeholder-val">—</td>'; });
      }
      html += '</tr>';
    });

    // Totals/Averages row
    var totalOSV = 0, cnt = 0, sTP = 0, sTM = 0, sTT = 0, sHP = 0, sHD = 0, sHV = 0;
    for (var i = 0; i < 12; i++) {
      if (monthly[i]) {
        totalOSV += monthly[i][0]; cnt++;
        sTP += monthly[i][0] * monthly[i][1];
        sTM += monthly[i][0] * monthly[i][2];
        sTT += monthly[i][0] * monthly[i][3];
        sHP += monthly[i][0] * monthly[i][4];
        sHD += monthly[i][5];
        sHV += monthly[i][6];
      }
    }
    if (totalOSV > 0) {
      html += '<tr style="background:var(--gray-100);font-weight:700;"><td>Acumulado</td>';
      html += '<td>' + totalOSV + '</td>';
      html += '<td>' + formatEur(sTP / totalOSV) + '</td>';
      html += '<td>' + formatEur(sTM / totalOSV) + '</td>';
      html += '<td style="color:var(--accent);">' + formatEur(sTT / totalOSV) + '</td>';
      html += '<td>' + formatNum(sHP / totalOSV) + '</td>';
      html += '<td>' + formatNum(sHD) + '</td>';
      html += '<td>' + formatNum(sHV) + '</td>';
      var mDataLeg = MARGEM_DATA[state.year] && MARGEM_DATA[state.year][state.unit];
      var tVendas = 0;
      if (mDataLeg) { for (var j = 0; j < 12; j++) { if (mDataLeg[j] && monthly[j]) tVendas += mDataLeg[j][1]; } }
      html += '<td>' + formatEur(tVendas && sHV ? tVendas / sHV : 0) + '</td>';
      html += '</tr>';
    }

    html += '</tbody></table></div>';

    document.getElementById('content').innerHTML = html;
    setTimeout(function() { renderTicketMensalChart(monthly); }, 80);
  }

  function renderTicketMensalChart(data) {
    var canvas = document.getElementById('indicadorChart');
    if (!canvas) return;
    if (currentChart) { currentChart.destroy(); currentChart = null; }

    // Detecta formato: arr de objetos {lp,em,pa,...} → ramo 2026 · arr de arrays [osv,peças,...] → legacy
    var isClient = data && data.some(function(m) { return m && m.lp; });

    if (isClient) {
      var labels = [], lpVals = [], emVals = [], paVals = [], totVals = [];
      for (var i = 0; i < 12; i++) {
        var d = data[i];
        if (!d) continue;
        labels.push(MONTHS_SHORT[i]);
        lpVals.push(d.lp.t);
        emVals.push(d.em.t);
        paVals.push(d.pa.t);
        totVals.push(d.lp.e + d.em.e + d.pa.e);
      }
      currentChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: 'Total Faturado (€)', data: totVals, type: 'bar',
              backgroundColor: 'rgba(0,59,115,.10)', borderColor: 'rgba(0,59,115,.35)', borderWidth: 1, borderRadius: 6,
              yAxisID: 'y' },
            { label: 'LP + FC', data: lpVals, type: 'line',
              borderColor: 'rgba(217,119,6,1)', backgroundColor: 'rgba(217,119,6,.12)',
              borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: 'rgba(217,119,6,1)', tension: 0.3, fill: false, yAxisID: 'y1' },
            { label: 'Empresa', data: emVals, type: 'line',
              borderColor: 'rgba(5,150,105,1)', backgroundColor: 'rgba(5,150,105,.12)',
              borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: 'rgba(5,150,105,1)', tension: 0.3, fill: false, yAxisID: 'y1' },
            { label: 'Particular', data: paVals, type: 'line',
              borderColor: 'rgba(124,58,237,1)', backgroundColor: 'rgba(124,58,237,.12)',
              borderWidth: 2.5, pointRadius: 5, pointBackgroundColor: 'rgba(124,58,237,1)', tension: 0.3, fill: false, yAxisID: 'y1' }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { font: { family: 'Inter', size: 11 }, usePointStyle: true, padding: 16 } },
            tooltip: {
              backgroundColor: '#002B55',
              callbacks: {
                label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + ' €'; }
              }
            }
          },
          scales: {
            y: { beginAtZero: true, position: 'left', title: { display: true, text: 'Total Faturado (€)', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.04)' }, ticks: { callback: function(v) { return (v/1000).toFixed(0) + 'k'; }, font: { size: 10 } } },
            y1: { beginAtZero: true, position: 'right', title: { display: true, text: 'Ticket médio (€)', font: { size: 11 } }, grid: { drawOnChartArea: false }, ticks: { callback: function(v) { return v + ' €'; }, font: { size: 10 } } },
            x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11, weight: '600' } } }
          }
        }
      });
      return;
    }

    // Legacy (2025): OSV + Ticket Total
    var labels = [], ticketVals = [], osvVals = [];
    for (var i = 0; i < 12; i++) {
      if (data[i]) {
        labels.push(MONTHS_SHORT[i]);
        ticketVals.push(data[i][3]);
        osvVals.push(data[i][0]);
      }
    }
    currentChart = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          { label: 'Nº OSV', data: osvVals,
            backgroundColor: 'rgba(0,59,115,.25)', borderColor: 'rgba(0,59,115,.6)',
            borderWidth: 1, borderRadius: 6, yAxisID: 'y' },
          { label: 'Ticket Médio Total (€)', data: ticketVals, type: 'line',
            borderColor: 'rgba(0,123,192,1)', backgroundColor: 'rgba(0,123,192,.08)',
            borderWidth: 2.5, pointRadius: 6, pointBackgroundColor: 'rgba(0,123,192,1)',
            fill: true, tension: 0.3, yAxisID: 'y1' }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top', labels: { font: { family: 'Inter', size: 11 }, usePointStyle: true, padding: 16 } },
          tooltip: {
            backgroundColor: '#002B55',
            callbacks: {
              label: function(ctx) {
                if (ctx.dataset.yAxisID === 'y1') return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + ' €';
                return ctx.dataset.label + ': ' + ctx.parsed.y;
              }
            }
          }
        },
        scales: {
          y: { beginAtZero: true, position: 'left', title: { display: true, text: 'Nº OSV', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.04)' }, ticks: { font: { size: 10 } } },
          y1: { position: 'right', title: { display: true, text: 'Ticket (€)', font: { size: 11 } }, grid: { drawOnChartArea: false }, ticks: { callback: function(v) { return v + ' €'; }, font: { size: 10 } } },
          x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 11, weight: '600' } } }
        }
      }
    });
  }

  // ══════ Level 3: Units ══════
  function renderUnits() {
    var cat = CATEGORIES.find(function(c) { return c.id === state.category; });
    var unitIcons = { mecanica_lisboa: '🔧', mecanica_cacem: '⚙️', colisao: '🚗', domuscar: '🏢' };
    var filteredUnits = UNITS.filter(function(u) {
      if (u.margemOnly && state.category !== 'margem') return false;
      return true;
    });
    var html = '<button class="btn-back" onclick="navigate(\'' + state.category + '\')">← Voltar</button>' +
      '<h2 style="font-size:1.2rem;font-weight:800;color:var(--navy);margin:20px 0 8px;">' + cat.icon + ' ' + cat.title + ' — ' + state.year + '</h2>' +
      '<p style="font-size:.9rem;color:var(--text-body);margin-bottom:24px;">Seleciona a unidade para ver os dados detalhados.</p>' +
      '<div class="unit-grid">';
    filteredUnits.forEach(function(u) {
      html += '<div class="unit-card" onclick="navigate(\'' + state.category + '\',' + state.year + ',\'' + u.id + '\')">' +
        '<div class="unit-icon ' + u.iconClass + '">' + (unitIcons[u.id] || '📊') + '</div>' +
        '<div><h4>' + u.name + '</h4><p>Dados ' + state.year + '</p></div>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('content').innerHTML = html;
  }

  // ══════ Level 4: Data (chart + table) ══════
  function renderData() {
    var cat = CATEGORIES.find(function(c) { return c.id === state.category; });
    var unit = UNITS.find(function(u) { return u.id === state.unit; });

    // Check if we have real data
    var hasRealData = false;
    var realData = null;
    if (cat.id === 'kpis' && KPI_DATA[state.year] && KPI_DATA[state.year][state.unit]) {
      hasRealData = true;
      realData = KPI_DATA[state.year][state.unit];
    } else if (cat.id === 'margem' && MARGEM_DATA[state.year] && MARGEM_DATA[state.year][state.unit]) {
      hasRealData = true;
      realData = MARGEM_DATA[state.year][state.unit];
    }

    var html = '<button class="btn-back" onclick="navigate(\'' + state.category + '\',' + state.year + ')">← Voltar</button>';

    html += '<div class="data-header" style="margin-top:20px;">' +
      '<h2>' + cat.icon + ' ' + cat.title + ' — ' + unit.name + ' ' + state.year + '</h2>';
    if (hasRealData) {
      html += '<span class="data-badge" style="background:rgba(5,150,105,.1);color:#059669;">Dados Reais</span>';
    } else {
      html += '<span class="data-badge placeholder">Em Breve</span>';
    }
    html += '</div>';

    if (!hasRealData) {
      html += '<div class="info-banner">ℹ️ Os dados para esta categoria/ano ainda não foram carregados.</div>';
    }

    // Quando existir detalhe completo de margem (MARGEM_DETAIL), salta-se a tabela-resumo
    // (que só traz MO+Peças e gerava confusão porque essas 2 rubricas não somam o Total Vendas s/IVA).
    // O detalhe mostra TODAS as 22 rubricas com subtotais fechados.
    var hasMargemDetail = (cat.id === 'margem' && MARGEM_DETAIL[state.year] && MARGEM_DETAIL[state.year][state.unit]);

    // Quando usamos o detalhe da margem, em vez do gráfico (que duplicava informação do detalhe)
    // mostramos 2 cards de resumo: Margem do último mês + Acumulado do ano da unidade.
    if (hasMargemDetail) {
      html += renderMargemSummary(MARGEM_DETAIL[state.year][state.unit]);
    } else {
      // Chart
      html += '<div class="chart-container"><canvas id="indicadorChart"></canvas></div>';
    }

    var tableData = hasRealData ? realData : generatePlaceholder(cat.id);

    if (!hasMargemDetail) {
      // Table
      html += '<div class="data-table-wrap"><table class="data-table"><thead><tr><th>Mês</th>';
      cat.columns.forEach(function(col) {
        html += '<th>' + col + '</th>';
      });
      html += '</tr></thead><tbody>';

      MONTHS.forEach(function(m, i) {
        html += '<tr><td style="font-weight:600;color:var(--navy);">' + m + '</td>';
        if (hasRealData && tableData[i] !== null) {
          if (cat.id === 'kpis') {
            html += '<td>' + formatNum(tableData[i][0]) + '</td>';
            html += '<td>' + formatNum(tableData[i][1]) + '</td>';
            html += '<td>' + formatNum(tableData[i][2]) + '</td>';
            html += '<td style="font-weight:700;color:' + efColor(tableData[i][3]) + ';">' + tableData[i][3].toFixed(1) + '%</td>';
            html += '<td style="font-weight:700;color:' + utColor(tableData[i][4]) + ';">' + tableData[i][4].toFixed(1) + '%</td>';
          } else if (cat.id === 'margem') {
            html += '<td>' + formatEur(tableData[i][0]) + '</td>';
            html += '<td>' + formatEur(tableData[i][1]) + '</td>';
            html += '<td>' + formatEur(tableData[i][2]) + '</td>';
            html += '<td>' + formatEur(tableData[i][3]) + '</td>';
            html += '<td>' + formatEur(tableData[i][4]) + '</td>';
            var mVal = tableData[i][5];
            html += '<td style="font-weight:700;color:' + (mVal >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(mVal) + '</td>';
            html += '<td style="font-weight:700;color:' + (tableData[i][6] >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + tableData[i][6].toFixed(2) + '%</td>';
          } else {
            tableData[i].forEach(function(v) { html += '<td>' + (v !== null ? v : '—') + '</td>'; });
          }
        } else {
          cat.columns.forEach(function() {
            html += '<td class="placeholder-val">—</td>';
          });
        }
        html += '</tr>';
      });

      html += '</tbody></table></div>';
    }

    // ══════ Detalhe Mensal (apenas Margem + quando existir MARGEM_DETAIL) ══════
    if (hasMargemDetail) {
      html += renderMargemDetail(MARGEM_DETAIL[state.year][state.unit]);
    }

    // ══════ Vista por Técnico (apenas KPIs 2026+) ══════
    var hasTecData = (cat.id === 'kpis' && KPI_TECNICOS_DATA[state.year] && KPI_TECNICOS_DATA[state.year][state.unit]);
    if (hasTecData) {
      html += '<div id="tec-section-wrap">' + renderTecnicosSection(state.year, state.unit) + '</div>';
    }

    document.getElementById('content').innerHTML = html;

    // Render chart (só quando existir o canvas — no modo detalhe foi substituído pelos cards resumo)
    if (!hasMargemDetail) {
      setTimeout(function() { renderChart(cat, tableData, hasRealData); }, 50);
    }
  }

  // ══════ Renderizador da Vista por Técnico (KPIs 2026) ══════
  function renderTecnicosSection(year, unitId) {
    var months = KPI_TECNICOS_DATA[year] && KPI_TECNICOS_DATA[year][unitId];
    if (!months) return '';

    // Determine available months and default selected
    var available = [];
    for (var i = 0; i < 12; i++) { if (months[i]) available.push(i); }
    if (available.length === 0) return '';

    // Initialize/sanitize selected month
    if (state.tecMonth === null || !months[state.tecMonth]) {
      state.tecMonth = available[available.length - 1];
    }
    var m = state.tecMonth;
    var data = months[m];

    var unitClassMap = { 'mecanica_lisboa': 'lisboa', 'mecanica_cacem': 'cacem', 'colisao': 'colisao' };
    var cardCls = unitClassMap[unitId] || '';

    var html = '<div class="tec-section">';
    html += '<h3 class="tec-section-title">👷 Análise por Técnico — ' + MONTHS[m] + ' ' + year + '</h3>';

    // Month tabs
    html += '<div class="tec-month-tabs">';
    for (var i = 0; i < 12; i++) {
      var label = MONTHS_SHORT[i] + ' ' + year;
      if (months[i]) {
        var cls = (i === m) ? 'tec-month-tab active' : 'tec-month-tab';
        html += '<div class="' + cls + '" onclick="selectTecMonth(' + i + ')">' + label + '</div>';
      }
    }
    html += '</div>';

    // --- Unit-level KPI table ---
    var semanas = (data.unit.ht && data.unit.ht.s5 !== undefined) ? 5 : 4;
    html += '<div class="tec-subsection">';
    html += '<div class="tec-subsection-header">KPIs Gerais — ' + (UNITS.find(function(u){return u.id===unitId;}) || {}).name + '</div>';
    html += '<div style="overflow-x:auto"><table class="tec-kpi-table"><thead><tr><th>KPI</th>';
    for (var s = 1; s <= semanas; s++) { html += '<th>S' + s + '</th>'; }
    html += '<th>Mês</th></tr></thead><tbody>';

    var kpiRows = [
      { key: 'ht',         label: 'Horas Trabalhadas',     unit: 'h', colorized: false },
      { key: 'hv',         label: 'Horas Vendidas',        unit: 'h', colorized: false },
      { key: 'hd',         label: 'Horas Disponíveis',     unit: 'h', colorized: false },
      { key: 'faltas',     label: 'Horas Faltas',          unit: 'h', colorized: false },
      { key: 'ferias',     label: 'Horas Férias',          unit: 'h', colorized: false },
      { key: 'ef_prod',    label: 'Eficiência Produtiva',  unit: '%', colorized: true, kind: 'ef' },
      { key: 'ef_global',  label: 'Eficiência Global',     unit: '%', colorized: true, kind: 'ef' },
      { key: 'utilizacao', label: 'Taxa de Utilização',    unit: '%', colorized: true, kind: 'ut' }
    ];
    kpiRows.forEach(function(row) {
      var u = data.unit[row.key] || {};
      html += '<tr><td style="font-weight:600;">' + row.label + '</td>';
      for (var s = 1; s <= semanas; s++) {
        var v = u['s' + s];
        html += '<td>' + fmtTecVal(v, row.unit, row.colorized, row.kind) + '</td>';
      }
      html += '<td class="mes">' + fmtTecVal(u.mes, row.unit, row.colorized, row.kind) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';

    // --- Rankings (HF + Total Faturado) ---
    var tecnicos = data.tecnicos || [];
    var rHF = tecnicos.slice().sort(function(a,b){ return (b.hf_mes||0)-(a.hf_mes||0); });
    var rEUR = tecnicos.slice().sort(function(a,b){ return (b.total_faturado||0)-(a.total_faturado||0); });
    var medals = ['🥇','🥈','🥉'];

    html += '<div class="tec-kpi-rankings">';
    html += '<div class="tec-subsection"><div class="tec-subsection-header">Ranking Horas Faturadas</div>';
    html += '<table class="tec-ranking-table"><thead><tr><th>#</th><th>Técnico</th><th style="text-align:right">HF</th></tr></thead><tbody>';
    rHF.forEach(function(t, idx) {
      var tag = idx < 3 ? medals[idx] : (idx + 1);
      html += '<tr><td>' + tag + '</td><td style="font-weight:600;">' + t.name + '</td><td style="text-align:right">' + (t.hf_mes !== null ? t.hf_mes.toFixed(1) + ' h' : '—') + '</td></tr>';
    });
    html += '</tbody></table></div>';

    html += '<div class="tec-subsection"><div class="tec-subsection-header">Ranking Total Faturado (€)</div>';
    html += '<table class="tec-ranking-table"><thead><tr><th>#</th><th>Técnico</th><th style="text-align:right">€</th></tr></thead><tbody>';
    var totalEur = 0;
    rEUR.forEach(function(t, idx) {
      var tag = idx < 3 ? medals[idx] : (idx + 1);
      totalEur += (t.total_faturado || 0);
      html += '<tr><td>' + tag + '</td><td style="font-weight:600;">' + t.name + '</td><td style="text-align:right">' + formatEur(t.total_faturado) + '</td></tr>';
    });
    html += '</tbody></table>';
    html += '<div style="text-align:right; margin-top:8px; font-weight:700; color:var(--accent);">TOTAL: ' + formatEur(totalEur) + '</div>';
    html += '</div>';
    html += '</div>';

    // --- Per-technician cards ---
    html += '<div class="tec-subsection"><div class="tec-subsection-header">Técnicos Individuais</div>';
    html += '<div class="tec-grid">';
    tecnicos.forEach(function(t) {
      html += '<div class="tec-card ' + cardCls + '">';
      html += '<div class="tec-card-name">' + t.name + '</div>';

      // Weeks table
      html += '<table class="tec-card-weeks"><thead><tr><th>Sem</th><th>HT</th><th>HD</th><th>Util</th></tr></thead><tbody>';
      t.weeks.forEach(function(w) {
        var uCls = w.u !== null ? tecUtilColorClass(w.u) : '';
        html += '<tr>';
        html += '<td>S' + w.s + '</td>';
        html += '<td>' + (w.ht !== null ? w.ht.toFixed(1) + 'h' : '—') + '</td>';
        html += '<td>' + (w.hd !== null ? w.hd.toFixed(1) + 'h' : '—') + '</td>';
        html += '<td' + (uCls ? ' class="' + uCls + '"' : '') + '>' + (w.u !== null ? w.u.toFixed(1) + '%' : '—') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';

      // Financials bar (HF + Total €)
      html += '<div class="tec-card-financials">';
      html += '<div class="tec-card-fin-item"><span class="tec-card-fin-label">H. Faturadas</span><span class="tec-card-fin-value">' + (t.hf_mes !== null ? t.hf_mes.toFixed(1) + 'h' : '—') + '</span></div>';
      html += '<div class="tec-card-fin-item" style="text-align:right;"><span class="tec-card-fin-label">Total Faturado</span><span class="tec-card-fin-value">' + formatEur(t.total_faturado) + '</span></div>';
      html += '</div>';

      // Summary: EF PROD / EF GLOBAL / Utilização (3 slots, 2x2 grid)
      html += '<div class="tec-card-summary" style="grid-template-columns:1fr 1fr 1fr;">';
      html += '<div class="tec-card-summary-item"><span class="tec-card-summary-label">Ef. Prod</span><span class="tec-card-summary-value" style="color:' + (t.ef_prod !== null ? efColor(t.ef_prod) : 'var(--gray-600)') + ';">' + (t.ef_prod !== null ? t.ef_prod.toFixed(1) + '%' : '—') + '</span></div>';
      html += '<div class="tec-card-summary-item"><span class="tec-card-summary-label">Ef. Global</span><span class="tec-card-summary-value" style="color:' + (t.ef_global !== null ? efColor(t.ef_global) : 'var(--gray-600)') + ';">' + (t.ef_global !== null ? t.ef_global.toFixed(1) + '%' : '—') + '</span></div>';
      html += '<div class="tec-card-summary-item"><span class="tec-card-summary-label">Utilização</span><span class="tec-card-summary-value" style="color:' + (t.utilizacao_mes !== null ? utColor(t.utilizacao_mes) : 'var(--gray-600)') + ';">' + (t.utilizacao_mes !== null ? t.utilizacao_mes.toFixed(1) + '%' : '—') + '</span></div>';
      html += '</div>';

      html += '</div>';
    });
    html += '</div></div>';

    html += '</div>';
    return html;
  }

  // Formatter for tec-kpi-table cells
  function fmtTecVal(v, unit, colorized, kind) {
    if (v === null || v === undefined) return '—';
    var suffix = unit === '%' ? '%' : 'h';
    var str = v.toFixed(unit === '%' ? 1 : 1) + suffix;
    if (!colorized) return str;
    var color;
    if (kind === 'ef') color = efColor(v);
    else if (kind === 'ut') color = utColor(v);
    return '<span style="color:' + color + ';font-weight:700;">' + str + '</span>';
  }

  // Utilização color class for week cells
  function tecUtilColorClass(v) {
    if (v === null || v === undefined) return '';
    if (v < 70)  return 'tec-util-bad';
    if (v < 85)  return 'tec-util-warn';
    if (v <= 115) return 'tec-util-ok';
    return 'tec-util-high';
  }

  // Month tab click handler
  function selectTecMonth(m) {
    state.tecMonth = m;
    var wrap = document.getElementById('tec-section-wrap');
    if (wrap) {
      wrap.innerHTML = renderTecnicosSection(state.year, state.unit);
    }
  }

  // ══════ Renderizador do Resumo da Margem (cards) ══════
  // 2 cards lado-a-lado: Margem do último mês com dados + Acumulado anual da unidade.
  function renderMargemSummary(monthly) {
    var idxs = [];
    for (var i = 0; i < 12; i++) { if (monthly[i]) idxs.push(i); }
    if (idxs.length === 0) return '';

    function sumGroupMonth(group, m) {
      return MARGEM_DETAIL_ROWS
        .filter(function(r) { return r.group === group; })
        .reduce(function(a, r) { return a + monthly[m][r.idx]; }, 0);
    }

    // Último mês com dados
    var lastIdx = idxs[idxs.length - 1];
    var lVendas = sumGroupMonth('vendas', lastIdx);
    var lCF     = sumGroupMonth('cf',     lastIdx);
    var lCV     = sumGroupMonth('cv',     lastIdx);
    var lCustos = lCF + lCV;
    var lMargem = lVendas - lCustos;
    var lMargemPct = lVendas !== 0 ? (lMargem / lVendas * 100) : 0;

    // Acumulado do ano
    var aVendas = 0, aCF = 0, aCV = 0;
    idxs.forEach(function(m) {
      aVendas += sumGroupMonth('vendas', m);
      aCF     += sumGroupMonth('cf',     m);
      aCV     += sumGroupMonth('cv',     m);
    });
    var aCustos = aCF + aCV;
    var aMargem = aVendas - aCustos;
    var aMargemPct = aVendas !== 0 ? (aMargem / aVendas * 100) : 0;

    var mColor = lMargem >= 0 ? 'var(--green)' : 'var(--red)';
    var aColor = aMargem >= 0 ? 'var(--green)' : 'var(--red)';
    var nMeses = idxs.length;
    var labelMeses = nMeses === 1 ? '1 mês' : nMeses + ' meses';

    function metricCell(label, value, color) {
      return '<div>' +
        '<div style="font-size:.68rem;color:var(--text-body);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">' + label + '</div>' +
        '<div style="font-size:1.05rem;font-weight:800;color:' + (color || 'var(--navy)') + ';">' + value + '</div>' +
      '</div>';
    }

    var h = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin:18px 0 4px;">';

    // Card 1 — Último mês
    h += '<div style="background:linear-gradient(135deg,#f0f7fc 0%,#fff 100%);border:1px solid #dce8f2;border-left:4px solid var(--navy);border-radius:12px;padding:18px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
    h += '<span style="font-size:1.1rem;">📅</span>';
    h += '<span style="font-size:.75rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--navy);font-weight:800;">Margem do Mês — ' + MONTHS[lastIdx] + '</span>';
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;">';
    h += metricCell('Vendas s/ IVA', formatEur(lVendas));
    h += metricCell('Custos Totais', formatEur(lCustos), 'var(--text-primary)');
    h += metricCell('Margem €', formatEur(lMargem), mColor);
    h += metricCell('Margem %', lMargemPct.toFixed(2) + ' %', mColor);
    h += '</div></div>';

    // Card 2 — Acumulado anual
    h += '<div style="background:linear-gradient(135deg,#fbf6ea 0%,#fff 100%);border:1px solid #e8d79e;border-left:4px solid #c9a227;border-radius:12px;padding:18px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
    h += '<span style="font-size:1.1rem;">📊</span>';
    h += '<span style="font-size:.75rem;text-transform:uppercase;letter-spacing:1.2px;color:#8a6d0f;font-weight:800;">Acumulado ' + state.year + ' <span style="opacity:.7;font-weight:600;">(YTD — ' + labelMeses + ')</span></span>';
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;">';
    h += metricCell('Vendas s/ IVA', formatEur(aVendas));
    h += metricCell('Custos Totais', formatEur(aCustos), 'var(--text-primary)');
    h += metricCell('Margem €', formatEur(aMargem), aColor);
    h += metricCell('Margem %', aMargemPct.toFixed(2) + ' %', aColor);
    h += '</div></div>';

    h += '</div>';
    return h;
  }

  // ══════ Renderizador do Detalhe Mensal da Margem ══════
  // Mostra todas as rubricas de vendas e custos que compõem a margem, com coluna por mês
  // que tenha dados + coluna Acumulado. Agrupa por: Vendas → Custos Fixos → Custos Variáveis → Margem.
  function renderMargemDetail(monthly) {
    // Meses com dados
    var idxs = [];
    for (var i = 0; i < 12; i++) { if (monthly[i]) idxs.push(i); }
    if (idxs.length === 0) return '';

    function sumIdx(rowIdx) {
      var s = 0;
      idxs.forEach(function(m) { s += monthly[m][rowIdx]; });
      return s;
    }
    function sumGroup(group) {
      var rows = MARGEM_DETAIL_ROWS.filter(function(r) { return r.group === group; });
      return idxs.map(function(m) {
        return rows.reduce(function(a, r) { return a + monthly[m][r.idx]; }, 0);
      });
    }

    // Totais por grupo e por mês (ordem: igual a idxs)
    var totVendas = sumGroup('vendas');
    var totCF     = sumGroup('cf');
    var totCV     = sumGroup('cv');
    var margem    = idxs.map(function(_, k) { return totVendas[k] - totCF[k] - totCV[k]; });
    var margemPct = idxs.map(function(_, k) { return totVendas[k] !== 0 ? (margem[k] / totVendas[k] * 100) : 0; });

    // Acumulados
    var accVendas = totVendas.reduce(function(a, b) { return a + b; }, 0);
    var accCF     = totCF.reduce(function(a, b) { return a + b; }, 0);
    var accCV     = totCV.reduce(function(a, b) { return a + b; }, 0);
    var accMargem = margem.reduce(function(a, b) { return a + b; }, 0);
    var accMargemPct = accVendas !== 0 ? (accMargem / accVendas * 100) : 0;

    var h = '<h3 style="font-size:1.05rem;font-weight:800;color:var(--navy);margin:36px 0 4px;">📑 Detalhe Mensal — Vendas e Custos</h3>';
    h += '<p style="font-size:.82rem;color:var(--text-body);margin-bottom:14px;">Desagregação completa de todas as rubricas que compõem a margem, conforme os relatórios mensais.</p>';
    h += '<div class="data-table-wrap"><table class="data-table"><thead><tr>';
    h += '<th style="text-align:left;">Rubrica</th>';
    idxs.forEach(function(m) { h += '<th>' + MONTHS[m] + '</th>'; });
    if (idxs.length > 1) h += '<th style="background:var(--navy-light);color:#fff;">Acumulado</th>';
    h += '</tr></thead><tbody>';

    function groupHeaderRow(label, totals, accVal, cls) {
      var r = '<tr style="background:var(--gray-100);font-weight:700;">';
      r += '<td style="text-align:left;color:var(--navy);">' + label + '</td>';
      totals.forEach(function(v) {
        r += '<td style="font-weight:700;' + (cls || '') + '">' + formatEur(v) + '</td>';
      });
      if (idxs.length > 1) r += '<td style="font-weight:700;background:var(--gray-100);' + (cls || '') + '">' + formatEur(accVal) + '</td>';
      r += '</tr>';
      return r;
    }
    function detailRow(rowDef) {
      var r = '<tr><td style="text-align:left;padding-left:22px;color:var(--text-body);">' + rowDef.label + '</td>';
      var acc = 0;
      idxs.forEach(function(m) {
        var v = monthly[m][rowDef.idx];
        acc += v;
        var style = '';
        if (v < 0) style = 'color:var(--red);';
        else if (v === 0) style = 'color:var(--gray-600);';
        r += '<td style="' + style + '">' + (v === 0 ? '—' : formatEur(v)) + '</td>';
      });
      if (idxs.length > 1) {
        var styleAcc = acc < 0 ? 'color:var(--red);' : (acc === 0 ? 'color:var(--gray-600);' : '');
        r += '<td style="background:var(--gray-100);' + styleAcc + '">' + (acc === 0 ? '—' : formatEur(acc)) + '</td>';
      }
      r += '</tr>';
      return r;
    }
    // Soma várias rubricas (índices) numa única linha — usado p/ vendas consolidadas (Peças, MO)
    function detailCombinedRow(label, indicesArr) {
      var r = '<tr><td style="text-align:left;padding-left:22px;color:var(--text-body);">' + label + '</td>';
      var acc = 0;
      idxs.forEach(function(m) {
        var v = indicesArr.reduce(function(a, i) { return a + monthly[m][i]; }, 0);
        acc += v;
        var style = '';
        if (v < 0) style = 'color:var(--red);';
        else if (v === 0) style = 'color:var(--gray-600);';
        r += '<td style="' + style + '">' + (v === 0 ? '—' : formatEur(v)) + '</td>';
      });
      if (idxs.length > 1) {
        var styleAcc = acc < 0 ? 'color:var(--red);' : (acc === 0 ? 'color:var(--gray-600);' : '');
        r += '<td style="background:var(--gray-100);' + styleAcc + '">' + (acc === 0 ? '—' : formatEur(acc)) + '</td>';
      }
      r += '</tr>';
      return r;
    }

    // Vendas — vista consolidada: 3 linhas (Peças totais, MO totais, Mobilidade)
    h += groupHeaderRow('TOTAL VENDAS S/ IVA', totVendas, accVendas, '');
    // Peças = idx 0 (Rappel LP Peças), 3 (Vendas Peças), 4 (Vendas Serviços), 6 (Fat. Int. P/S), 8 (Aguarda NE P/S), 10 (Outras P/S)
    h += detailCombinedRow('Vendas Peças Totais — S/ Rappel', [0, 3, 4, 6, 8, 10]);
    // Mão de Obra = idx 1 (Rappel LP Horas), 2 (Vendas MO), 7 (Fat. Int. Horas), 9 (Aguarda NE Horas), 11 (Outras Horas)
    h += detailCombinedRow('Vendas Mão de Obra Totais — S/ Rappel', [1, 2, 7, 9, 11]);
    // Serviço de Mobilidade = idx 5 (mantém-se isolado)
    h += detailRow({ label: 'Serviço de Mobilidade', idx: 5 });

    // Custos Fixos — só o total (sem breakdown)
    h += groupHeaderRow('TOTAL CUSTOS FIXOS', totCF, accCF, '');

    // Custos Variáveis — só o total (sem breakdown)
    h += groupHeaderRow('TOTAL CUSTOS VARIÁVEIS', totCV, accCV, '');

    // Margem
    h += '<tr style="background:rgba(0,59,115,.08);font-weight:800;">';
    h += '<td style="text-align:left;color:var(--navy);">MARGEM €</td>';
    margem.forEach(function(v) {
      h += '<td style="font-weight:800;color:' + (v >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(v) + '</td>';
    });
    if (idxs.length > 1) {
      h += '<td style="background:rgba(0,59,115,.08);font-weight:800;color:' + (accMargem >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + formatEur(accMargem) + '</td>';
    }
    h += '</tr>';

    h += '<tr style="background:rgba(0,59,115,.08);font-weight:800;">';
    h += '<td style="text-align:left;color:var(--navy);">MARGEM %</td>';
    margemPct.forEach(function(v) {
      h += '<td style="font-weight:800;color:' + (v >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + v.toFixed(2) + '%</td>';
    });
    if (idxs.length > 1) {
      h += '<td style="background:rgba(0,59,115,.08);font-weight:800;color:' + (accMargemPct >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + accMargemPct.toFixed(2) + '%</td>';
    }
    h += '</tr>';

    h += '</tbody></table></div>';
    return h;
  }

  function formatNum(v) {
    if (v === null || v === undefined) return '—';
    return v.toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatEur(v) {
    if (v === null || v === undefined) return '—';
    return v.toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
  }

  // Eficiência Produtiva color: <100 red, 100-104 yellow, 105+ green
  function efColor(v) {
    if (v < 100) return 'var(--red)';
    if (v < 105) return 'var(--yellow)';
    return 'var(--green)';
  }

  // Utilização color: <80 red, 80-84 yellow, 85+ green
  function utColor(v) {
    if (v < 80) return 'var(--red)';
    if (v < 85) return 'var(--yellow)';
    return 'var(--green)';
  }

  function isMonthPast(year, monthIndex) {
    var now = new Date();
    if (year < now.getFullYear()) return true;
    if (year === now.getFullYear() && monthIndex < now.getMonth()) return true;
    return false;
  }

  function generatePlaceholder(catId) {
    var data = [];
    for (var i = 0; i < 12; i++) {
      if (catId === 'kpis') {
        data.push([
          (75 + Math.random() * 20).toFixed(1),
          (70 + Math.random() * 25).toFixed(1),
          (1 + Math.random() * 5).toFixed(1),
          Math.floor(120 + Math.random() * 80),
          Math.floor(160 + Math.random() * 40)
        ]);
      } else if (catId === 'ticket') {
        var pecas = Math.floor(150 + Math.random() * 200);
        var mao = Math.floor(80 + Math.random() * 120);
        data.push([
          pecas + mao,
          pecas,
          mao,
          Math.floor(80 + Math.random() * 60)
        ]);
      } else {
        var fat = Math.floor(30000 + Math.random() * 20000);
        var cust = Math.floor(fat * (0.55 + Math.random() * 0.2));
        var marg = fat - cust;
        data.push([
          fat,
          cust,
          marg,
          ((marg / fat) * 100).toFixed(1)
        ]);
      }
    }
    return data;
  }

            },
            x: {
              grid: { display: false },
              ticks: { font: { family: 'Inter', size: 11, weight: '500' } }
            }
          }
        }
      });
    } else {
      // Placeholder: empty chart with message
      currentChart = new Chart(canvas, {
        type: 'bar',
        data: { labels: MONTHS_SHORT, datasets: [{ label: '—', data: [], backgroundColor: 'rgba(0,123,192,.15)' }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,.04)' } }, x: { grid: { display: false } } }
        }
      });
    }
  }

  // Expose navigate globally
  window.navigate = navigate;
  window.selectTecMonth = selectTecMonth;

  // Init
  navigate();

})();
</script>
