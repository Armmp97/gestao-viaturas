<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Clientes — DomusCar</title>
<script src="https://unpkg.com/globe.gl@2.32.3/dist/globe.gl.min.js"></script>
<style>
  :root {
    --bg: #05070d;
    --panel: rgba(13, 18, 30, 0.82);
    --panel-border: rgba(99, 130, 200, 0.18);
    --text: #e8ecf3;
    --text-dim: #8a94a8;
    --accent: #60a5fa;
    --cacem: #10b981;
    --lisboa: #3b82f6;
    --colisao: #f97316;
    --outros: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  #globeContainer {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #0d1930 0%, #050a18 70%, #02030a 100%);
  }
  /* Stars twinkle layer */
  #starfield {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 30%, rgba(200,220,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 60%, rgba(180,200,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 85%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 75% 15%, rgba(220,230,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, #fff 0%, transparent 100%);
    background-size: 100% 100%;
    opacity: 0.7;
  }
  header {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #60a5fa 0%, #10b981 50%, #f97316 100%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  header p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .panel {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    z-index: 5;
  }
  #controls {
    top: 72px;
    left: 20px;
    width: 280px;
  }
  #stats {
    top: 72px;
    right: 20px;
    width: 300px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }
  #stats::-webkit-scrollbar { width: 6px; }
  #stats::-webkit-scrollbar-thumb { background: rgba(99, 130, 200, 0.3); border-radius: 3px; }
  .panel h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .panel-section {
    margin-bottom: 18px;
  }
  .panel-section:last-child { margin-bottom: 0; }
  .unit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
  }
  .unit-row:hover { background: rgba(255, 255, 255, 0.05); }
  .unit-row input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 2px solid currentColor;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .unit-row input[type="checkbox"]:checked {
    background: currentColor;
  }
  .unit-row input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    color: #0a0a0f;
    font-weight: 800;
  }
  .unit-row .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .unit-row .name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }
  .unit-row .count {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .unit-row.cacem { color: var(--cacem); }
  .unit-row.lisboa { color: var(--lisboa); }
  .unit-row.outros { color: var(--outros); }
  /* Year range */
  .year-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .year-label .value {
    color: var(--accent);
    font-weight: 600;
  }
  .range-wrap {
    position: relative;
    height: 24px;
  }
  .range-track {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
  }
  .range-fill {
    position: absolute;
    top: 10px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--cacem));
    border-radius: 2px;
    pointer-events: none;
  }
  input[type="range"] {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 24px;
    appearance: none;
    background: transparent;
    pointer-events: none;
    margin: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    cursor: pointer;
    pointer-events: auto;
    margin-top: -6px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--accent);
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }
  .actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 9px 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:hover {
    background: rgba(255, 255, 255, 0.09);
    border-color: rgba(96, 165, 250, 0.4);
  }
  .btn.active {
    background: rgba(96, 165, 250, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .stat-card {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .stat-card:last-child { border-bottom: none; }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .top-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
    list-style: none;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
  }
  .top-list li:last-child { border-bottom: none; }
  .top-list .city-name {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .top-list .city-count {
    color: var(--accent);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin-left: 8px;
  }
  .top-list .rank {
    display: inline-block;
    width: 18px;
    height: 18px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 50%;
    text-align: center;
    line-height: 18px;
    font-size: 10px;
    color: var(--text-dim);
    margin-right: 8px;
    flex-shrink: 0;
  }
  .top-list li:nth-child(1) .rank { background: rgba(250, 204, 21, 0.2); color: #facc15; }
  .top-list li:nth-child(2) .rank { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
  .top-list li:nth-child(3) .rank { background: rgba(251, 146, 60, 0.2); color: #fb923c; }
  #tooltip {
    position: absolute;
    background: rgba(5, 10, 20, 0.95);
    border: 1px solid rgba(96, 165, 250, 0.4);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    display: none;
    min-width: 180px;
  }
  #tooltip .t-city {
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    margin-bottom: 4px;
  }
  #tooltip .t-total {
    color: var(--accent);
    font-size: 12px;
    margin-bottom: 6px;
  }
  #tooltip .t-unit {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-top: 2px;
  }
  #tooltip .t-unit-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .back-link {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    padding: 6px 10px;
    background: rgba(13, 18, 30, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 11px;
    transition: all 0.15s;
    backdrop-filter: blur(8px);
  }
  .back-link:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .legend-note {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
  }
  @media (max-width: 900px) {
    #controls, #stats {
      position: fixed;
      top: auto;
      width: calc(50% - 24px);
    }
    #controls { bottom: 16px; left: 16px; }
    #stats { bottom: 16px; right: 16px; }
    header h1 { font-size: 16px; }
  }
</style>
</head>

  <div id="stats" class="panel">

    <div class="panel-section">

    </div>
    <div class="panel-section">
      <h2>Repartição</h2>
      <div id="splitChart"></div>
    </div>
  </div>

const UNIT_LABELS = {
  mecanica_cacem:  { label: 'Mecânica Cacém',  color: '#10b981', hub: 'mecanica_cacem' },
  mecanica_lisboa: { label: 'Mecânica Lisboa', color: '#3b82f6', hub: 'mecanica_lisboa' },
  outros:          { label: 'Colisão / Outros', color: '#f97316', hub: 'colisao' },
};

const state = {
  units: { mecanica_cacem: true, mecanica_lisboa: true, outros: true },
  yearStart: 2014,
  yearEnd: 2026,
  rotating: false,
};

// --------- Build Unit List (checkboxes) ---------
const unitListEl = document.getElementById('unitList');
Object.entries(UNIT_LABELS).forEach(([key, u]) => {
  // Compute total for this unit
  const total = DATA.cities.reduce((s, c) => s + (c.by_unit[key] || 0), 0);
  const row = document.createElement('label');
  row.className = `unit-row ${key === 'mecanica_cacem' ? 'cacem' : key === 'mecanica_lisboa' ? 'lisboa' : 'outros'}`;
  row.style.color = u.color;
  row.innerHTML = `
    <input type="checkbox" checked data-unit="${key}">
    <span class="dot"></span>
    <span class="name" style="color: var(--text)">${u.label}</span>
    <span class="count">${total.toLocaleString('pt-PT')}</span>
  `;
  unitListEl.appendChild(row);
  row.querySelector('input').addEventListener('change', (e) => {
    state.units[key] = e.target.checked;
    refresh();
  });
});

// --------- Year slider ---------
const yStart = document.getElementById('yStart');
const yEnd   = document.getElementById('yEnd');
const yStartLabel = document.getElementById('yStartLabel');
const yEndLabel   = document.getElementById('yEndLabel');
const rangeFill   = document.getElementById('rangeFill');

function updateRangeFill() {
  const min = 2014, max = 2026;
  const p1 = (parseInt(yStart.value) - min) / (max - min) * 100;
  const p2 = (parseInt(yEnd.value) - min)   / (max - min) * 100;
  rangeFill.style.left = p1 + '%';
  rangeFill.style.width = (p2 - p1) + '%';
}

function onYearChange() {
  let a = parseInt(yStart.value);
  let b = parseInt(yEnd.value);
  if (a > b) { const t = a; a = b; b = t; yStart.value = a; yEnd.value = b; }
  state.yearStart = a;
  state.yearEnd   = b;
  yStartLabel.textContent = a;
  yEndLabel.textContent   = b;
  updateRangeFill();
  refresh();
}
yStart.addEventListener('input', onYearChange);
yEnd.addEventListener('input',   onYearChange);
updateRangeFill();

// --------- Build Globe ---------

if (typeof Globe !== 'function') {

    '</div>';

// Diagnostic overlay — visible in-page if something fails so we don't see just a black square
function showDiag(msg, isError) {
  let d = document.getElementById('globeDiag');
  if (!d) {
    d = document.createElement('div');
    d.id = 'globeDiag';
    d.style.cssText = 'position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; ' +
      'background:rgba(10,14,26,0.92); border:1px solid rgba(99,130,200,0.3); border-radius:12px; ' +
      'padding:14px 22px; color:#e8ecf3; font-family:sans-serif; font-size:13px; text-align:center; ' +
      'box-shadow:0 8px 30px rgba(0,0,0,0.6); max-width:460px; line-height:1.5;';
    globeEl.appendChild(d);
  }
  d.innerHTML = msg;
  d.style.borderColor = isError ? '#f87171' : 'rgba(96,165,250,0.4)';
}
function clearDiag() {
  const d = document.getElementById('globeDiag');
  if (d) d.remove();
}

// GeoJSON country outlines — used to draw the globe as a stylised illustration
// (no photographic textures, just flat polygons with borders)
const GEOJSON_URLS = [
  'https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson',
  'https://cdn.jsdelivr.net/gh/vasturiano/globe.gl@master/example/datasets/ne_110m_admin_0_countries.geojson',
  'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson',
  'https://datahub.io/core/geo-countries/r/countries.geojson',
];

async function loadGeoJson() {
  for (const url of GEOJSON_URLS) {
    try {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) continue;
      const json = await res.json();
      if (json && json.features && json.features.length > 100) return json;
    } catch (e) { /* try next */ }
  }
  return null;
}

function probeTexture(urls) {
  return new Promise((resolve) => {
    let idx = 0;
    const tryNext = () => {
      if (idx >= urls.length) return resolve(null);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(urls[idx]);
      img.onerror = () => { idx++; tryNext(); };
      img.src = urls[idx];
    };
    tryNext();
  });
}

showDiag('A carregar mapa…', false);

// Countries where we have at least one client (derived from the data)
const COUNTRIES_WITH_CLIENTS = new Set([
  'Portugal', 'Spain', 'France', 'Germany', 'Italy', 'Netherlands',
  'United Kingdom', 'Poland', 'Switzerland', 'Liechtenstein', 'Estonia',
  'Austria', 'Belgium',
]);
// Name property varies between GeoJSON sources
function countryName(feat) {
  const p = feat.properties || {};
  return p.ADMIN || p.NAME || p.name || p.NAME_LONG || p.sovereignt || '';
}

let globe;
loadGeoJson().then((geo) => {
  globe = Globe()(globeEl)
    .backgroundColor('rgba(0,0,0,0)')
    .showAtmosphere(true)
    .atmosphereColor('#60a5fa')
    .atmosphereAltitude(0.2)
    .pointOfView({ lat: 38.7, lng: -9.2, altitude: 2.2 });

  // Flat ocean colour — no photo texture, just a solid dark-blue sphere.
  try {
    const mat = globe.globeMaterial && globe.globeMaterial();
    if (mat) {
      if (mat.color && mat.color.set)    mat.color.set(0x0e2140);
      if (mat.emissive && mat.emissive.set) mat.emissive.set(0x061024);
      mat.shininess = 4;
      mat.needsUpdate = true;
    }
  } catch (e) { console.warn('globeMaterial setup failed', e); }

  // Check WebGL availability
  const canvas = globeEl.querySelector('canvas');
  if (!canvas) {
    showDiag('<strong style="color:#f87171;">Canvas não foi criado</strong><br>O navegador pode não suportar WebGL.', true);
    return;
  }
  const gl = canvas.getContext && (canvas.getContext('webgl2') || canvas.getContext('webgl'));
  if (!gl) {
    showDiag('<strong style="color:#f87171;">WebGL indisponível</strong><br>Ativa a aceleração por hardware em <code>edge://settings/system</code> e recarrega a página.', true);
    return;
  }

  // Draw countries as polygons (cartoon / illustration look)
  if (geo && geo.features) {
    globe
      .polygonsData(geo.features.filter(f => countryName(f) !== 'Antarctica'))
      .polygonAltitude(d => {
        const n = countryName(d);
        if (n === 'Portugal') return 0.012;
        if (COUNTRIES_WITH_CLIENTS.has(n)) return 0.008;
        return 0.005;
      })
      .polygonCapColor(d => {
        const n = countryName(d);
        if (n === 'Portugal') return 'rgba(96, 165, 250, 0.78)';   // destaque azul
        if (COUNTRIES_WITH_CLIENTS.has(n)) return 'rgba(52, 100, 160, 0.6)';
        return 'rgba(35, 64, 100, 0.55)';
      })
      .polygonSideColor(() => 'rgba(20, 40, 70, 0.65)')
      .polygonStrokeColor(() => 'rgba(180, 210, 255, 0.35)')
      .polygonsTransitionDuration(0);
    clearDiag();
  } else {
    showDiag('<strong style="color:#fbbf24;">Não foi possível carregar os contornos dos países</strong><br>O globo aparece como esfera lisa — verifica a ligação à internet.', true);
    setTimeout(clearDiag, 5000);
  }

  sizeGlobe();
  requestAnimationFrame(() => requestAnimationFrame(sizeGlobe));
  setTimeout(sizeGlobe, 500);
  setTimeout(() => {
    if (globe.controls) {
      const ctrl = globe.controls();
      ctrl.autoRotate = false;
      ctrl.autoRotateSpeed = 0.35;
      ctrl.enableDamping = true;
      ctrl.dampingFactor = 0.08;
      ctrl.minDistance = 102;   // quase a tocar a superfície (raio=100)
      ctrl.maxDistance = 600;
      ctrl.zoomSpeed = 1.2;

      // Refresh arcs visibility on zoom change (debounced)
      let lastAlt = null, refreshTimer = null;
      ctrl.addEventListener('change', () => {
        try {
          const alt = globe.pointOfView().altitude;
          const bucket = alt > 1.2 ? 'far' : 'near';
          const lastBucket = lastAlt == null ? null : (lastAlt > 1.2 ? 'far' : 'near');
          if (bucket !== lastBucket) {
            clearTimeout(refreshTimer);
            refreshTimer = setTimeout(refresh, 150);
          }
          lastAlt = alt;
        } catch (e) {}
      });
    }
  }, 200);
  refresh();
}).catch(err => {
  console.error('Globe initialisation failed', err);
  showDiag('<strong style="color:#f87171;">Falha a inicializar o globo</strong><br>' + (err && err.message ? err.message : String(err)), true);
});

// --------- Filter + refresh ---------
function filterCities() {
  const activeUnits = Object.keys(state.units).filter(k => state.units[k]);
  return DATA.cities.map(c => {
    // Sum within active units + year range
    let filtered = 0;
    const byUnit = {};
    for (const u of activeUnits) {
      const uCount = c.by_unit[u] || 0;
      if (uCount === 0) continue;
      // Year filtering is applied proportionally to the unit's slice.
      // Since by_year aggregates all units together, we scale:
      //   unit_in_range ≈ (years in range / all years) * by_unit[u]
      // More accurate: compute year ratio
      let yearsInRange = 0;
      let yearsTotal = 0;
      for (const [y, n] of Object.entries(c.by_year || {})) {
        const yi = parseInt(y);
        yearsTotal += n;
        if (yi >= state.yearStart && yi <= state.yearEnd) yearsInRange += n;
      }
      const ratio = yearsTotal > 0 ? yearsInRange / yearsTotal : 0;
      const adj = uCount * ratio;
      byUnit[u] = adj;
      filtered += adj;
    }
    return { ...c, filtered, byUnit };
  }).filter(c => c.filtered > 0.5);
}

function refresh() {
  const filtered = filterCities();

  // Points: one per city, scaled by filtered total
  const maxT = Math.max(...filtered.map(c => c.filtered), 1);
  const points = filtered.map(c => ({
    lat: c.lat,
    lng: c.lng,
    size: Math.max(0.1, 0.15 + Math.pow(c.filtered / maxT, 0.5) * 1.3),
    total: c.filtered,
    city: c.city,
    byUnit: c.byUnit,
    // Color by dominant unit
    color: dominantColor(c.byUnit),
  }));

  // Arcs: one per city × active unit, from hub → city
  const arcs = [];
  filtered.forEach(c => {
    Object.entries(c.byUnit).forEach(([u, cnt]) => {
      if (cnt < 0.5) return;
      const hub = DATA.hubs[UNIT_LABELS[u].hub];
      if (!hub) return;
      // Skip self-arcs (city == hub location)
      if (Math.abs(hub.lat - c.lat) < 0.02 && Math.abs(hub.lng - c.lng) < 0.02) return;
      arcs.push({
        startLat: hub.lat, startLng: hub.lng,
        endLat: c.lat,     endLng: c.lng,
        color: UNIT_LABELS[u].color,
        count: cnt,
      });
    });
  });

  // Hubs: always shown as larger pulsing points
  // Map hub id → unit key (so we can show the unit's aggregated figures on hover)
  const HUB_TO_UNIT = { mecanica_cacem: 'mecanica_cacem', mecanica_lisboa: 'mecanica_lisboa', colisao: 'outros' };
  const hubPoints = Object.entries(DATA.hubs).map(([id, h]) => {
    const unitKey = HUB_TO_UNIT[id];
    // Sum this unit's clients across filtered cities → hub "traffic"
    const unitTotal = filtered.reduce((s, c) => s + (c.byUnit[unitKey] || 0), 0);
    return {
      lat: h.lat, lng: h.lng, size: 1.8, color: h.color,
      city: h.name,
      total: unitTotal,
      byUnit: { [unitKey]: unitTotal },
      cityCount: filtered.filter(c => (c.byUnit[unitKey] || 0) > 0.5).length,
      isHub: true,
    };
  });

  // City dots: NEUTRAL colour (soft white-blue), same style for every city.
  // No hub markers on the map — the 3 offices are represented only by where the arcs start.
  // The city name + per-unit breakdown shows only on hover.
  const CITY_COLOUR = '#cfe0ff';
  const cityPoints = points.map(p => ({ ...p, color: CITY_COLOUR }));

  globe
    .pointsData(cityPoints)
    .pointLat('lat').pointLng('lng')
    .pointColor('color')
    .pointAltitude(0.015)  // above the country polygons (max polygon alt = 0.012)
    .pointRadius(d => Math.max(0.012, 0.014 + Math.pow(d.size, 0.55) * 0.013))
    .pointResolution(20)
    .pointsMerge(false)
    .onPointHover(handleHover)
    .onPointClick(handleClick);

  // Arcs: only when looking at the whole globe — at close zoom they'd be visual clutter.
  const altitude = globe.pointOfView ? globe.pointOfView().altitude : 2.2;
  const showArcs = altitude > 1.2;
  globe
    .arcsData(showArcs ? arcs : [])
    .arcStartLat('startLat').arcStartLng('startLng')
    .arcEndLat('endLat').arcEndLng('endLng')
    .arcColor(d => [d.color + '77', d.color + '08'])
    .arcDashLength(0.5)
    .arcDashGap(0.3)
    .arcDashAnimateTime(() => 3200 + Math.random() * 1800)
    .arcStroke(d => Math.min(0.18, 0.04 + Math.log(1 + d.count) * 0.03))
    .arcAltitudeAutoScale(0.25);

  // No rings — we deliberately don't highlight any unit with colour on the map.
  globe.ringsData([]);

  updateStats(filtered);
}

function dominantColor(byUnit) {
  let best = null, bestV = 0;
  for (const [u, v] of Object.entries(byUnit)) {
    if (v > bestV) { bestV = v; best = u; }
  }
  return best ? UNIT_LABELS[best].color : '#888';
}

// --------- Stats panel ---------
const ptCountries = new Set(['Portugal']); // helper — we infer foreign by city name/coords
const FOREIGN_CITIES = new Set([
  'Madrid','Barcelona','Lugo','Badajoz','Sevilla','Valencia','Vigo',
  'Paris','Lyon','Marseille','Nice',
  'Berlin','Munich','Kongen','Frankfurt','Hamburg','Magdeburg',
  'Amsterdam','Rotterdam',
  'Rome','Milan',
  'Warsaw','Tallinn','Zurich','Vaduz'
]);

function updateStats(cities) {
  const total = Math.round(cities.reduce((s, c) => s + c.filtered, 0));
  document.getElementById('totalClients').textContent = total.toLocaleString('pt-PT');
  document.getElementById('totalCities').textContent  = cities.length;
  const foreign = cities.filter(c => FOREIGN_CITIES.has(c.city)).length;
  document.getElementById('totalCountries').textContent = (foreign > 0 ? (1 + new Set(cities.filter(c => FOREIGN_CITIES.has(c.city)).map(c => c.city)).size) : 1);

  // Top list
  const top = [...cities].sort((a, b) => b.filtered - a.filtered).slice(0, 10);
  const ul = document.getElementById('topList');
  ul.innerHTML = '';
  top.forEach((c, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="rank">${i + 1}</span>
      <span class="city-name">${c.city}</span>
      <span class="city-count">${Math.round(c.filtered).toLocaleString('pt-PT')}</span>
    `;
    ul.appendChild(li);
  });

  // Split chart (horizontal bar per unit)
  const splitTotals = { mecanica_cacem: 0, mecanica_lisboa: 0, outros: 0 };
  cities.forEach(c => Object.entries(c.byUnit).forEach(([u, v]) => { splitTotals[u] = (splitTotals[u] || 0) + v; }));
  const grand = Object.values(splitTotals).reduce((s, v) => s + v, 0) || 1;
  const sc = document.getElementById('splitChart');
  sc.innerHTML = '';
  Object.entries(UNIT_LABELS).forEach(([u, info]) => {
    const v = Math.round(splitTotals[u] || 0);
    const pct = (v / grand * 100);
    const row = document.createElement('div');
    row.style.cssText = 'margin-bottom: 8px;';
    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; font-size: 11px; margin-bottom: 4px;">
        <span style="color: ${info.color}; font-weight: 600;">${info.label}</span>
        <span style="color: var(--text-dim);">${v.toLocaleString('pt-PT')} · ${pct.toFixed(0)}%</span>
      </div>
      <div style="height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden;">
        <div style="height: 100%; width: ${pct}%; background: ${info.color}; box-shadow: 0 0 8px ${info.color}66;"></div>
      </div>
    `;
    sc.appendChild(row);
  });
}

// --------- Tooltip ---------
const tooltip = document.getElementById('tooltip');

function handleHover(pt) {
  if (!pt) {
    tooltip.style.display = 'none';
    globeEl.style.cursor = 'grab';
    return;
  }
  globeEl.style.cursor = 'pointer';
  let unitHtml = '';
  if (pt.byUnit) {
    Object.entries(pt.byUnit).forEach(([u, v]) => {
      if (v < 0.5) return;
      const info = UNIT_LABELS[u];
      unitHtml += `<div class="t-unit">
        <span><span class="t-unit-dot" style="background:${info.color}"></span>${info.label}</span>
        <span style="color: var(--text-dim); font-variant-numeric: tabular-nums;">${Math.round(v).toLocaleString('pt-PT')}</span>
      </div>`;
    });
  }
  const title = pt.isHub ? `🏢 ${pt.city}` : pt.city;
  const subtitle = pt.isHub
    ? `${Math.round(pt.total).toLocaleString('pt-PT')} clientes · Oficina sede${pt.cityCount ? ` · ${pt.cityCount} cidades` : ''}`
    : `${Math.round(pt.total).toLocaleString('pt-PT')} clientes`;
  tooltip.innerHTML = `
    <div class="t-city">${title}</div>
    <div class="t-total">${subtitle}</div>
    ${unitHtml}
  `;
  tooltip.style.display = 'block';
}

function handleClick(pt) {
  if (!pt) return;
  globe.pointOfView({ lat: pt.lat, lng: pt.lng, altitude: 0.9 }, 1200);
}

// Follow mouse for tooltip
document.addEventListener('mousemove', (e) => {
  if (tooltip.style.display === 'block') {
    let x = e.clientX + 14;
    let y = e.clientY + 14;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 14;
    if (y + th > window.innerHeight - 10) y = e.clientY - th - 14;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }
});

// Resize handler (globe may not be initialised yet — guard it)
function sizeGlobe() {
  if (globe && globe.width) {
    globe.width(window.innerWidth).height(window.innerHeight);
  }
}
window.addEventListener('resize', sizeGlobe);
</script>
