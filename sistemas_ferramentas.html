<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomusCar — Sistemas e Ferramentas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #003B73; --navy-deep: #002B55; --navy-light: #00508F;
  --accent: #007BC0; --accent-light: #4DA8DA; --white: #FFFFFF; --off-white: #F5F7FA;
  --gray-100: #EEF1F5; --gray-200: #DEE2E8; --gray-400: #9CA3AF;
  --gray-600: #6B7280; --text-dark: #1A2A3A; --text-body: #475569;
  --radius: 16px; --transition: .3s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--off-white); color:var(--text-body); line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
.container { max-width:1140px; margin:0 auto; padding:0 24px; }
.hero {
  position:relative;
  background:linear-gradient(135deg,var(--navy-deep) 0%,var(--navy) 50%,var(--navy-light) 100%);
  color:var(--white); overflow:hidden; min-height:320px; display:flex; align-items:center;
}
.hero::before {
  content:''; position:absolute; top:-40%; right:-10%;
  width:700px; height:700px;
  background:radial-gradient(circle,rgba(0,123,192,.12) 0%,transparent 70%);
  border-radius:50%; pointer-events:none;
}
.hero-inner { position:relative; z-index:2; padding:60px 0 50px; }
.hero h1 {
  font-size:clamp(1.8rem,4vw,2.6rem); font-weight:900;
  line-height:1.15; margin-bottom:16px;
}
.hero h1 em { font-style:normal; color:var(--accent); }
.hero-desc { font-size:1.05rem; line-height:1.8; max-width:640px; opacity:.85; }
.hero-bar {
  position:absolute; bottom:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg,var(--accent) 0%,var(--accent) 70%,var(--navy-light) 70%);
}
.placeholder-section {
  padding:80px 0; text-align:center;
}
.placeholder-icon {
  width:80px; height:80px; margin:0 auto 24px;
  background:rgba(0,59,115,.06); border-radius:20px;
  display:flex; align-items:center; justify-content:center;
}
.placeholder-icon svg { width:36px; height:36px; color:var(--navy); }
.placeholder-title {
  font-size:1.4rem; font-weight:700; color:var(--navy); margin-bottom:12px;
}
.placeholder-text {
  font-size:1rem; color:var(--gray-600); max-width:500px; margin:0 auto;
}
</style>
</head>
<body>
<div class="hero">
  <div class="container">
    <div class="hero-inner">
      <h1>Sistemas e Ferramentas</h1>
      <p class="hero-desc">Guias de utilização dos sistemas internos: Officegest, 2Smart, SharePoint e outros.</p>
    </div>
  </div>
  <div class="hero-bar"></div>
</div>
<div class="placeholder-section">
  <div class="container">
    <div class="placeholder-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>
    <div class="placeholder-title">Conteúdo em preparação</div>
    <p class="placeholder-text">Esta secção está a ser desenvolvida. Em breve estará disponível com informação completa para toda a equipa.</p>
  </div>
</div>
</body>
</html>
